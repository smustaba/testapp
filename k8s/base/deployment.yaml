apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-azure-demo
  labels:
    app: k8s-azure-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k8s-azure-demo
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: k8s-azure-demo
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: api
          image: myregistry.example.com/k8s-azure-demo:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: k8s-azure-demo-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: k8s-azure-demo-secrets
                  key: DB_USER
                  optional: true
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: k8s-azure-demo-secrets
                  key: DB_PASSWORD
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
