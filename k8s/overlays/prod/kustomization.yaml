apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Point to the shared base
resources:
  - ../../base
  - namespace.yaml

# Keep prod resources in the prod namespace
namespace: k8s-azure-demo

# Environment label on every resource
commonLabels:
  env: prod

patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: k8s-azure-demo
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: k8s-azure-demo-config
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: k8s-azure-demo
