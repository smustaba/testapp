version: '3.9'
services:
  db:
    image: postgres:16-alpine
    container_name: k8s-azure-demo-db
    environment:
      POSTGRES_DB: itemsdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d itemsdb']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: k8s-azure-demo-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PROVIDER: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: itemsdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      APP_VERSION: '1.0.0'
    ports:
      - '3000:3000'

volumes:
  postgres_data:
